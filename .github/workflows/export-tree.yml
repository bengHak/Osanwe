name: Export recovered tree

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove Git metadata
        run: rm -rf .git
      - uses: actions/upload-artifact@v4
        with:
          name: recovered-tree
          path: .
          include-hidden-files: true
          if-no-files-found: error
