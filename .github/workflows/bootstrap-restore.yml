name: Restore implementation bundle

on:
  push:
    branches: [feat/curl-install]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/curl-install
          fetch-depth: 0

      - name: Restore source tree
        shell: bash
        run: |
          set -euo pipefail
          test -f .bootstrap/part-00

          archive="$RUNNER_TEMP/osanwe-source.tar.gz"
          restore="$RUNNER_TEMP/osanwe-source"
          mkdir -p "$restore"

          python3 - "$archive" <<'PY'
          import base64
          import glob
          import pathlib
          import sys

          destination = pathlib.Path(sys.argv[1])
          parts = [pathlib.Path(path) for path in sorted(glob.glob('.bootstrap/part-*'))]
          if not parts:
              raise SystemExit('no .bootstrap/part-* files found')

          texts = [''.join(path.read_text().split()) for path in parts]
          joined = ''.join(texts)
          try:
              payload = base64.b64decode(joined, validate=True)
          except Exception:
              payload = b''.join(base64.b64decode(text, validate=True) for text in texts)

          destination.write_bytes(payload)
          PY

          gzip -t "$archive"
          tar -xzf "$archive" -C "$restore"

          source_root="$restore"
          if [[ ! -f "$source_root/Cargo.toml" ]]; then
            mapfile -t candidates < <(find "$restore" -mindepth 1 -maxdepth 3 -type f -name Cargo.toml -printf '%h\n' | sort -u)
            if [[ ${#candidates[@]} -ne 1 ]]; then
              echo "Unable to identify restored source root" >&2
              find "$restore" -maxdepth 4 -type f | sort >&2
              exit 1
            fi
            source_root="${candidates[0]}"
          fi

          rsync -a \
            --exclude '.git/' \
            --exclude '.bootstrap/' \
            --exclude '.github/workflows/' \
            "$source_root/" ./

          rm -rf .bootstrap

      - name: Commit restored implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No restored changes to commit"
            exit 0
          fi
          git commit -m "feat: restore Osanwe implementation [skip ci]"
          git push origin HEAD:feat/curl-install
