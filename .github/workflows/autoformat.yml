name: Autoformat recovery branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/curl-install
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: rustfmt
      - name: Format and lock dependencies
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit formatting
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format Rust sources and lock dependencies"
          git push origin HEAD:feat/curl-install
