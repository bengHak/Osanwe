name: Rust diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: Capture Clippy diagnostics
        id: clippy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo clippy --all-targets --all-features -- -D warnings > clippy.log 2>&1
          status=$?
          echo "$status" > clippy.status
          cat clippy.log
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-diagnostics
          path: |
            clippy.log
            clippy.status
          if-no-files-found: error
      - name: Enforce Clippy result
        if: always()
        run: test "$(cat clippy.status)" -eq 0
